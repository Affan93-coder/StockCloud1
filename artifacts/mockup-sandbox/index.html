<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockCast</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
    }
    button:hover {
      background-color: #0056b3;
    }
    button:disabled {
      background-color: #a0c4ff;
      cursor: not-allowed;
    }
    #result {
      font-size: 18px;
      margin-top: 24px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <h2>StockCast — Today's Order</h2>

  <form id="recommendForm">
    <div class="form-group">
      <label for="city">City:</label>
      <input id="city" type="text" value="Ahmedabad" required>
    </div>

    <div class="form-group">
      <label for="category">Category:</label>
      <select id="category">
        <option value="cold_beverages">Cold Beverages</option>
        <option value="dairy_chaas_lassi">Dairy (Chaas / Lassi)</option>
        <option value="hot_snacks">Hot Snacks</option>
        <option value="general_staples">General Staples</option>
      </select>
    </div>

    <div class="form-group">
      <label for="baseline">Your usual daily units:</label>
      <input id="baseline" type="number" value="50" min="1" required>
    </div>

    <button type="submit" id="submitBtn">Get Suggestion</button>
  </form>

  <p id="result"></p>

  <script>
    const form = document.getElementById('recommendForm');
    const resultEl = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault(); // Prevents page reload

      const cityVal = document.getElementById('city').value.trim();
      const categoryVal = document.getElementById('category').value;
      const baselineVal = document.getElementById('baseline').value.trim();

      if (!cityVal || !baselineVal || Number(baselineVal) <= 0) {
        resultEl.innerText = "Please enter a valid city and baseline quantity.";
        return;
      }

      const city = encodeURIComponent(cityVal);
      const category = encodeURIComponent(categoryVal);
      const baseline = encodeURIComponent(baselineVal);

      // Loading state
      submitBtn.disabled = true;
      resultEl.innerText = "Fetching weather recommendation...";

      try {
        // Change '/api/recommend' to 'http://localhost:5000/api/recommend' if running backend on local server
        const res = await fetch(`/api/recommend?city=${city}&category=${category}&baseline=${baseline}`);

        if (!res.ok) {
          throw new Error(`HTTP error! status: ${res.status}`);
        }

        const data = await res.json();

        const range = data.suggested_range;
        if (!Array.isArray(range) || range.length < 2) {
          throw new Error("Invalid response format from backend.");
        }

        const temp = data.temp ?? 'N/A';
        const rainProb = data.rain_prob ?? 'N/A';

        resultEl.innerText =
          `Stock ${range[0]}–${range[1]} units today ` +
          `(forecast ${temp}°C, ${rainProb}% rain chance)`;

      } catch (err) {
        console.error("Fetch Error:", err);
        resultEl.innerText = "Error fetching recommendation. Please check your network or server.";
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
